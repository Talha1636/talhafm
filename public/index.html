<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TalhaFM IRC</title>

<style>
body {
  background: #111;
  color: #0f0;
  font-family: monospace;
}

.box {
  width: 400px;
  margin: 50px auto;
  border: 1px solid #0f0;
  padding: 10px;
}

#chat {
  height: 300px;
  overflow-y: scroll;
  border: 1px solid #0f0;
  padding: 5px;
  margin-bottom: 10px;
}

input, button {
  width: 100%;
  margin-top: 5px;
  padding: 5px;
  background: black;
  color: #0f0;
  border: 1px solid #0f0;
}
</style>

</head>
<body>

<div class="box">

  <div id="chat"></div>

  <input id="user" placeholder="Kullanıcı adı">
  <input id="msg" placeholder="Mesaj yaz...">
  <button onclick="send()">Gönder</button>

</div>

<script>
async function load() {
  const res = await fetch("/api/messages");
  const data = await res.json();

  document.getElementById("chat").innerHTML =
    data.map(m => `<div><b>${m.user}</b>: ${m.message}</div>`).join("");
}

async function send() {
  const user = document.getElementById("user").value;
  const message = document.getElementById("msg").value;

  await fetch("/api/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user, message })
  });

  document.getElementById("msg").value = "";
  load();
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
