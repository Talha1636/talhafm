<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRC Chat</title>

<style>
body {
  margin: 0;
  background: #0d1117;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono";
  color: #e6edf3;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container */
.container {
  width: 90%;
  max-width: 720px;
  height: 85vh;
  display: flex;
  flex-direction: column;
  border-radius: 12px;
  background: #161b22;
  box-shadow: 0 0 30px rgba(0,255,120,0.15);
  overflow: hidden;
}

/* header */
.header {
  padding: 14px;
  text-align: center;
  font-weight: bold;
  background: #0d1117;
  border-bottom: 1px solid #30363d;
  color: #00ff9d;
}

/* chat area */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.msg {
  margin: 6px 0;
  padding: 8px 10px;
  background: #0d1117;
  border-radius: 8px;
  border: 1px solid #30363d;
}

.user {
  color: #58a6ff;
  font-weight: bold;
}

/* input area */
.input {
  display: flex;
  padding: 10px;
  gap: 8px;
  border-top: 1px solid #30363d;
  background: #0d1117;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #30363d;
  background: #161b22;
  color: #e6edf3;
  outline: none;
}

input:focus {
  border-color: #00ff9d;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #00ff9d;
  color: #0d1117;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00d17d;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">IRC Terminal Chat (Modern UI)</div>

  <div id="chat"></div>

  <div class="input">
    <input id="user" placeholder="nick" />
    <input id="text" placeholder="mesaj yaz... (/clear)" />
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script>
async function load() {
  try {
    const res = await fetch("/api/messages");
    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(m => {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `<span class="user">${escapeHtml(m.user)}:</span> ${escapeHtml(m.text)}`;
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  } catch (err) {
    console.error("Load error:", err);
  }
}

/* XSS koruması */
function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

async function send() {
  const user = document.getElementById("user").value.trim();
  const text = document.getElementById("text").value.trim();

  if (!user || !text) return;

  // /clear komutu
  if (text === "/clear") {
    const ok = confirm("Tüm mesajlar silinsin mi?");
    if (!ok) return;

    await fetch("/api/messages/clear", {
      method: "POST"
    });

    document.getElementById("text").value = "";
    load();
    return;
  }

  await fetch("/api/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user, text })
  });

  document.getElementById("text").value = "";
  load();
}

load();
setInterval(load, 2000);
</script>

</body>
</html>
