<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTalk Ultra Pro</title>

<style>
:root{
  --bg:#0b0f14;
  --panel:#111827;
  --panel2:#0f172a;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
  --danger:#ef4444;
  --border:#1f2937;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:280px;
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.sidebar-header{
  padding:14px;
  border-bottom:1px solid var(--border);
  font-weight:bold;
}

.user-list{
  flex:1;
  overflow:auto;
  padding:10px;
}

.user{
  padding:8px;
  margin-bottom:4px;
  background:#0f172a;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  display:flex;
  justify-content:space-between;
}

.user:hover{background:#1f2937}

/* ================= MAIN ================= */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  padding:12px;
  background:var(--panel2);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}

.messages{
  flex:1;
  overflow:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  background:#111827;
  padding:8px;
  border-radius:8px;
  font-size:14px;
  display:flex;
  justify-content:space-between;
}

.msg span{color:var(--muted);font-size:11px}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:var(--panel2);
  border-top:1px solid var(--border);
}

input{
  flex:1;
  padding:10px;
  background:#111827;
  border:none;
  color:white;
  border-radius:6px;
}

button{
  margin-left:8px;
  padding:10px 14px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* ================= TYPING ================= */
.typing{
  font-size:12px;
  color:var(--muted);
  padding:4px 10px;
}

/* ================= MODAL ================= */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal{
  width:320px;
  background:var(--panel);
  padding:16px;
  border-radius:10px;
  border:1px solid var(--border);
}

.modal h3{margin-bottom:10px}
.modal p{color:var(--muted);font-size:13px}

.modal button{
  width:100%;
  margin-top:10px;
}

/* ================= MOBILE ================= */
@media(max-width:768px){
  .sidebar{width:200px}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">🟢 Online Users</div>
  <div class="user-list" id="users"></div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <b>NetTalk Ultra</b>
    <span id="onlineCount">0 online</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button onclick="send()">Gönder</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="mName">User</h3>
    <p id="mInfo">Info</p>
    <button onclick="closeModal()">Kapat</button>
  </div>
</div>

<script>

const API = "/api/messages";

let userId = null;
let nick = prompt("Nick:");
let selectedUser = null;

/* ================= JOIN ================= */
async function join(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"join",
      name:nick,
      roomId:"genel"
    })
  });

  const data = await res.json();
  userId = data.userId;
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API+"?roomId=genel");
  const data = await res.json();

  renderMessages(data.messages);
  renderUsers(data.users);
  renderTyping(data.typing || []);
}

/* ================= CLEAN OLD ================= */
function cleanMessages(msgs){
  // sadece son 50 mesaj
  return msgs.slice(-50);
}

/* ================= MESSAGES ================= */
function renderMessages(msgs){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs = cleanMessages(msgs);

  msgs.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b>${m.userName || "?"}</b>
      <span>${new Date(m.createdAt||Date.now()).toLocaleTimeString()}</span>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* ================= USERS ================= */
function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";

  users = users.slice(-20); // auto clean list

  document.getElementById("onlineCount").textContent = users.length + " online";

  users.forEach(u=>{
    const div = document.createElement("div");
    div.className="user";

    div.innerHTML = `
      <span>${u.name}</span>
      <small>i</small>
    `;

    div.onclick = ()=>openModal(u);

    box.appendChild(div);
  });
}

/* ================= TYPING ================= */
function renderTyping(list){
  document.getElementById("typing").textContent =
    list.length ? list.join(", ") + " yazıyor..." : "";
}

/* ================= SEND ================= */
async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  input.value="";

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"message",
      userId,
      text,
      roomId:"genel"
    })
  });

  load();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"heartbeat",
      userId
    })
  });
},5000);

/* ================= TYPING ================= */
document.getElementById("msg").addEventListener("input",()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"typing",
      userId,
      roomId:"genel"
    })
  });
});

/* ================= MODAL ================= */
function openModal(u){
  selectedUser = u;

  document.getElementById("mName").textContent = u.name;
  document.getElementById("mInfo").textContent =
    "Status: " + (u.status || "online");

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* ================= AUTO CLEAN UI ================= */
setInterval(()=>{
  load();
},2000);

/* ================= INIT ================= */
(async function(){
  await join();
  load();
})();

</script>

</body>
</html>
