<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTalk Pro Chat</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:#fff;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#111827;
  display:flex;
  flex-direction:column;
  border-right:1px solid #222;
}

.sidebar h3{
  padding:10px;
  margin:0;
  border-bottom:1px solid #222;
}

.users{
  padding:10px;
  overflow:auto;
  flex:1;
  font-size:13px;
  color:#aaa;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.topbar{
  padding:12px;
  background:#0f172a;
  border-bottom:1px solid #222;
  font-weight:bold;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg{
  background:#111827;
  padding:8px 10px;
  border-radius:8px;
  font-size:14px;
}

.msg b{
  color:#22c55e;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#0f172a;
  border-top:1px solid #222;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#111827;
  color:white;
}

button{
  margin-left:8px;
  padding:10px 14px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

/* TYPING */
.typing{
  font-size:12px;
  color:#888;
  padding:4px 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🟢 Online Users</h3>
  <div class="users" id="users"></div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    NetTalk Pro Chat
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button onclick="send()">Gönder</button>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const API = "/api/messages";

let userId = null;
let nick = prompt("Nick gir:");
let typingTimer = null;

/* ================= JOIN ================= */
async function join(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"join",
      name:nick,
      roomId:"genel"
    })
  });

  const data = await res.json();
  userId = data.userId;
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API + "?roomId=genel");
  const data = await res.json();

  renderMessages(data.messages);
  renderUsers(data.users);
  renderTyping(data.typing || []);
}

/* ================= MESSAGES ================= */
function renderMessages(msgs){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `<b>${m.userName || "?"}:</b> ${m.text}`;
    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* ================= USERS ================= */
function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u=>{
    const div = document.createElement("div");
    div.textContent = u.name + (u.status==="online"?" 🟢":" ⚫");
    box.appendChild(div);
  });
}

/* ================= TYPING ================= */
function renderTyping(list){
  document.getElementById("typing").textContent =
    list.length ? list.join(", ") + " yazıyor..." : "";
}

/* ================= SEND MESSAGE ================= */
async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  input.value="";

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"message",
      userId,
      text,
      roomId:"genel"
    })
  });

  load();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"heartbeat",
      userId
    })
  });
},5000);

/* ================= TYPING EVENT ================= */
document.getElementById("msg").addEventListener("input",()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"typing",
      userId,
      roomId:"genel"
    })
  });

  clearTimeout(typingTimer);
  typingTimer = setTimeout(()=>{},1000);
});

/* ================= INIT ================= */
(async function(){
  await join();
  load();
  setInterval(load,2000);
})();
</script>

</body>
</html>
