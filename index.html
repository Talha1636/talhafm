<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTalk Stable Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0f14;color:#fff;display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:260px;background:#111827;border-right:1px solid #222;
  display:flex;flex-direction:column;
}
.sidebar h3{padding:10px;margin:0;border-bottom:1px solid #222}
.users{flex:1;overflow:auto;padding:10px}
.user{padding:6px;background:#0f172a;margin-bottom:4px;border-radius:6px;font-size:13px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}
.top{padding:10px;background:#0f172a;border-bottom:1px solid #222}

.messages{
  flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px;
}

.msg{
  background:#111827;padding:8px;border-radius:6px;font-size:14px;
  display:flex;justify-content:space-between;
}

.msg small{color:#888;font-size:11px}

.input{
  display:flex;padding:10px;background:#0f172a;border-top:1px solid #222;
}

input{
  flex:1;padding:10px;background:#111827;border:none;color:#fff;border-radius:6px;
}

button{
  margin-left:8px;padding:10px 14px;background:#22c55e;border:none;
  border-radius:6px;font-weight:bold;cursor:pointer;
}

.typing{
  font-size:12px;color:#888;padding:4px 10px;
}
</style>
</head>

<body>

<!-- USERS -->
<div class="sidebar">
  <h3>🟢 Online</h3>
  <div class="users" id="users"></div>
</div>

<!-- CHAT -->
<div class="main">

  <div class="top">
    NetTalk Stable Chat
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button onclick="send()">Gönder</button>
  </div>

</div>

<script>

const API = "/api/messages";

let userId = null;
let nick = prompt("Nick gir:");
const MESSAGE_LIFETIME = 5 * 60 * 1000; // 5 dakika

/* ================= JOIN ================= */
async function join(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"join",
      name:nick,
      roomId:"genel"
    })
  });

  const data = await res.json();
  userId = data.userId;
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API+"?roomId=genel");
  const data = await res.json();

  renderMessages(data.messages);
  renderUsers(data.users);
}

/* ================= FILTER (5 DK) ================= */
function filterMessages(msgs){
  const now = Date.now();
  return msgs.filter(m=>{
    return now - (m.createdAt || now) < MESSAGE_LIFETIME;
  });
}

/* ================= MESSAGES ================= */
function renderMessages(msgs){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs = filterMessages(msgs);

  msgs.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <b>${m.userName || "?"}</b>
      <span>${m.text}</span>
      <small>${new Date(m.createdAt).toLocaleTimeString()}</small>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* ================= USERS ================= */
function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";

  const now = Date.now();
  const ACTIVE_TIME = 15000; // 15 sn

  // ❗ SADECE AKTİF KULLANICILAR
  const active = users.filter(u=>{
    return now - (u.lastSeen || 0) < ACTIVE_TIME;
  });

  active.forEach(u=>{
    const div = document.createElement("div");
    div.className="user";
    div.textContent = u.name + " 🟢";
    box.appendChild(div);
  });
}

/* ================= SEND ================= */
async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  input.value="";

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"message",
      userId,
      text,
      roomId:"genel"
    })
  });

  load();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"heartbeat",
      userId
    })
  });
},5000);

/* ================= TYPING ================= */
document.getElementById("msg").addEventListener("input",()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"typing",
      userId,
      roomId:"genel"
    })
  });
});

/* ================= AUTO REFRESH ================= */
setInterval(load,2000);

/* ================= INIT ================= */
(async function(){
  await join();
  load();
})();

</script>

</body>
</html>
