<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTalk Stable Pro</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:#0b0f14;
  color:#fff;
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#0f172a;
  border-right:1px solid #1f2937;
  display:flex;
  flex-direction:column;
}

.sidebar h3{
  margin:0;
  padding:12px;
  border-bottom:1px solid #1f2937;
}

.users{
  flex:1;
  overflow:auto;
  padding:10px;
}

.user{
  padding:8px;
  background:#111827;
  margin-bottom:6px;
  border-radius:8px;
  font-size:13px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.top{
  padding:12px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
  font-weight:600;
}

/* MESSAGES */
.messages{
  flex:1;
  overflow:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.msg{
  background:#111827;
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.msg-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:#9ca3af;
}

.msg-text{
  font-size:14px;
  word-break:break-word;
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:#0f172a;
  border-top:1px solid #1f2937;
}

input{
  flex:1;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#111827;
  color:#fff;
  outline:none;
}

button{
  margin-left:8px;
  padding:12px 16px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

/* typing */
.typing{
  font-size:12px;
  color:#9ca3af;
  padding:6px 12px;
  min-height:20px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🟢 Online</h3>
  <div class="users" id="users"></div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top">NetTalk Stable Chat</div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button onclick="send()">Gönder</button>
  </div>

</div>

<script>

const API = "/api/messages";

let userId = null;
let nick = prompt("Nick gir:") || "Anon";

/* ================= JOIN ================= */
async function join(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"join",
      name:nick,
      roomId:"genel"
    })
  });

  const data = await res.json();
  userId = data.userId;
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API+"?roomId=genel");
  const data = await res.json();

  renderMessages(data.messages || []);
  renderUsers(data.users || []);
}

/* ================= MESSAGES ================= */
function renderMessages(msgs){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs.forEach(m=>{
    const div = document.createElement("div");
    div.className = "msg";

    const time = m.createdAt
      ? new Date(m.createdAt).toLocaleTimeString()
      : "";

    div.innerHTML = `
      <div class="msg-header">
        <b>${m.userName || "?"}</b>
        <span>${time}</span>
      </div>
      <div class="msg-text">${escapeHtml(m.text)}</div>
    `;

    box.appendChild(div);
  });

  box.scrollTop = box.scrollHeight;
}

/* XSS güvenliği */
function escapeHtml(text){
  return text
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* ================= USERS ================= */
function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";

  const now = Date.now();
  const ACTIVE = 20000;

  users
    .filter(u => now - (u.lastSeen || 0) < ACTIVE)
    .forEach(u=>{
      const div = document.createElement("div");
      div.className="user";
      div.textContent = "🟢 " + u.name;
      box.appendChild(div);
    });
}

/* ================= SEND ================= */
async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  input.value = "";

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"message",
      userId,
      text,
      roomId:"genel"
    })
  });

  load();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"heartbeat",
      userId
    })
  });
},5000);

/* ================= TYPING ================= */
let typingTimeout;

document.getElementById("msg").addEventListener("input",()=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"typing",
      userId,
      roomId:"genel"
    })
  });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=>{
    document.getElementById("typing").textContent = "";
  },1000);
});

/* ================= AUTO REFRESH ================= */
setInterval(load,2000);

/* ================= INIT ================= */
(async function(){
  await join();
  load();
})();

</script>

</body>
</html>
