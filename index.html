<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetTalk Pro</title>

<style>
body{margin:0;font-family:system-ui;background:#0b0f14;color:#fff;display:flex;height:100vh}
.sidebar{width:240px;background:#111827;padding:10px;overflow:auto}
.main{flex:1;display:flex;flex-direction:column}
.top{padding:10px;background:#0f172a;border-bottom:1px solid #222}
.messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.msg{padding:6px 10px;background:#111827;border-radius:6px}
.msg b{color:#4ade80}
.input{display:flex;padding:10px;background:#0f172a}
input{flex:1;padding:10px;background:#111827;border:none;color:#fff;border-radius:6px}
button{margin-left:8px;padding:10px 14px;background:#22c55e;border:none;color:#000;font-weight:bold;border-radius:6px;cursor:pointer}
.user{font-size:13px;padding:4px 0;color:#aaa}
.typing{font-size:12px;color:#888;padding:4px 10px}
.room{cursor:pointer;padding:6px;border-radius:6px}
.room:hover{background:#1f2937}
.active{background:#22c55e;color:#000}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Rooms</h3>
  <div id="rooms"></div>

  <hr>

  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="main">
  <div class="top">
    <b>NetTalk Pro</b> — <span id="roomName">genel</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <div class="input">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button onclick="send()">Gönder</button>
  </div>
</div>

<script>
const API = "/api/chat";

let userId = null;
let room = "genel";
let nick = prompt("Nick?");
let typingTimeout = null;

/* ================= ROOMS ================= */
const rooms = ["genel","teknoloji","oyun"];

function renderRooms(){
  const r = document.getElementById("rooms");
  r.innerHTML = "";
  rooms.forEach(x=>{
    const d = document.createElement("div");
    d.textContent = x;
    d.className = "room " + (x===room?"active":"");
    d.onclick = ()=>switchRoom(x);
    r.appendChild(d);
  });
}

/* ================= JOIN ================= */
async function join(){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"join",name:nick,roomId:room})
  });

  const data = await res.json();
  userId = data.userId;
}

/* ================= LOAD ================= */
async function load(){
  const res = await fetch(API+"?roomId="+room);
  const data = await res.json();

  renderMessages(data.messages);
  renderUsers(data.users);
  renderTyping(data.typing);
}

/* ================= MESSAGES ================= */
function renderMessages(msgs){
  const box = document.getElementById("messages");
  box.innerHTML = "";

  msgs.forEach(m=>{
    const d = document.createElement("div");
    d.className = "msg";
    d.innerHTML = `<b>${m.userName}:</b> ${m.text}`;
    box.appendChild(d);
  });

  box.scrollTop = box.scrollHeight;
}

/* ================= USERS ================= */
function renderUsers(users){
  const box = document.getElementById("users");
  box.innerHTML = "";

  users.forEach(u=>{
    const d = document.createElement("div");
    d.className="user";
    d.textContent = u.name + (u.status==="online"?" 🟢":" ⚫");
    box.appendChild(d);
  });
}

/* ================= TYPING ================= */
function renderTyping(list){
  const box = document.getElementById("typing");
  if(!list || list.length===0){
    box.textContent="";
    return;
  }
  box.textContent = list.join(", ") + " yazıyor...";
}

/* ================= SEND ================= */
async function send(){
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if(!text) return;

  input.value="";

  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      type:"message",
      userId,
      text,
      roomId:room
    })
  });

  load();
}

/* ================= ROOM ================= */
function switchRoom(r){
  room = r;
  document.getElementById("roomName").textContent = r;
  renderRooms();
  load();
}

/* ================= HEARTBEAT ================= */
setInterval(()=>{
  if(!userId) return;
  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"heartbeat",userId})
  });
},5000);

/* ================= TYPING ================= */
document.getElementById("msg").addEventListener("input",(e)=>{
  if(!userId) return;

  fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type:"typing",userId,roomId:room})
  });

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=>{},1500);
});

/* ================= INIT ================= */
(async function(){
  renderRooms();
  await join();
  load();
  setInterval(load,2000);
})();
</script>

</body>
</html>
