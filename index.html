<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IRC Chat</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0d1117;
  color: #e6edf3;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LOGIN SCREEN */
.login {
  width: 320px;
  padding: 20px;
  background: #161b22;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,255,150,0.15);
  text-align: center;
}

.login h2 {
  color: #00ff9d;
  margin-bottom: 15px;
}

.login input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #30363d;
  background: #0d1117;
  color: #fff;
  margin-bottom: 10px;
}

.login button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #00ff9d;
  font-weight: bold;
  cursor: pointer;
}

.login button:hover {
  background: #00d17d;
}

/* CHAT SCREEN */
.container {
  width: 90%;
  max-width: 750px;
  height: 85vh;
  display: none;
  flex-direction: column;
  background: #161b22;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 25px rgba(0,255,150,0.15);
}

.header {
  padding: 12px;
  background: #0d1117;
  border-bottom: 1px solid #30363d;
  color: #00ff9d;
  text-align: center;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 6px 0;
  padding: 8px;
  border-radius: 8px;
  background: #0d1117;
  border: 1px solid #30363d;
}

.user {
  color: #58a6ff;
  font-weight: bold;
}

.input {
  display: flex;
  gap: 8px;
  padding: 10px;
  background: #0d1117;
  border-top: 1px solid #30363d;
}

input.msgInput {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #30363d;
  background: #161b22;
  color: white;
}

button.send {
  padding: 10px 14px;
  background: #00ff9d;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <h2>IRC Giriş</h2>
  <input id="nickInput" placeholder="Nick yaz..." />
  <button onclick="enterChat()">Giriş Yap</button>
</div>

<!-- CHAT -->
<div class="container" id="chatBox">
  <div class="header">IRC Chat</div>

  <div id="chat"></div>

  <div class="input">
    <input class="msgInput" id="text" placeholder="mesaj yaz... (/clear)">
    <button class="send" onclick="send()">Gönder</button>
  </div>
</div>

<script>
let nick = "";

// giriş
function enterChat() {
  const input = document.getElementById("nickInput").value.trim();
  if (!input) return;

  nick = input;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("chatBox").style.display = "flex";

  load();
}

// mesajları yükle
async function load() {
  const res = await fetch("/api/messages");
  const data = await res.json();

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<span class="user">${m.user}:</span> ${m.text}`;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

// gönder
async function send() {
  const text = document.getElementById("text").value.trim();
  if (!text) return;

  // clear komutu
  if (text === "/clear") {
    await fetch("/api/messages", {
      method: "DELETE"
    });

    document.getElementById("text").value = "";
    load();
    return;
  }

  await fetch("/api/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user: nick, text })
  });

  document.getElementById("text").value = "";
  load();
}

setInterval(() => {
  if (nick) load();
}, 2000);
</script>

</body>
</html>
